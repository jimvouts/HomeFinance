<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>HomeFinance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;
  --glass:rgba(255,255,255,0.05);
  --glass2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.10);
  --border2:rgba(255,255,255,0.18);
  --text:#f0f0f5;
  --text2:#9090a8;
  --red:#ff5f6d;
  --orange:#ff9a3c;
  --green:#43e97b;
  --yellow:#f9ca24;
  --cyan:#36d1dc;
  --accent:#6c8fff;
  --accent2:#a78bfa;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;overflow:hidden;position:fixed;width:100%}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(108,143,255,0.15) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,rgba(167,139,250,0.12) 0%,transparent 55%);pointer-events:none;z-index:0}

/* ── SCROLLABLE AREA ── */
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── GLASS ── */
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px}
.glass2{background:var(--glass2);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--border2);border-radius:20px}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:500;background:var(--bg);padding:24px;
  padding-top:calc(var(--safe-top) + 24px);
}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(108,143,255,0.2) 0%,transparent 65%);pointer-events:none}
.login-box{position:relative;width:100%;max-width:380px;padding:36px 28px;text-align:center}
.login-logo{font-size:52px;margin-bottom:12px;filter:drop-shadow(0 0 24px rgba(108,143,255,0.6));display:block}
.login-title{font-size:30px;font-weight:800;background:linear-gradient(135deg,#6c8fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.lf{margin-bottom:14px;text-align:left}
.lf label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.6px;text-transform:uppercase;display:block;margin-bottom:7px}
.lf input{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;color:var(--text);font-size:16px;font-family:'Outfit',sans-serif;outline:none;transition:all .2s;-webkit-appearance:none}
.lf input:focus{border-color:rgba(108,143,255,0.7);background:rgba(108,143,255,0.1);box-shadow:0 0 0 3px rgba(108,143,255,0.18)}
.login-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#6c8fff,#a78bfa);color:white;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Outfit',sans-serif;-webkit-appearance:none}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none}

/* ── APP SHELL ── */
#app-screen{
  display:none;flex-direction:column;
  height:100%;width:100%;position:fixed;inset:0;
  padding-top:var(--safe-top);
}

/* ── TOP BAR (mobile) ── */
#topbar{
  height:52px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(10,10,15,0.85);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid var(--border);
  position:relative;z-index:10;
}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-logo-icon{font-size:18px;filter:drop-shadow(0 0 8px rgba(108,143,255,0.5))}
.topbar-logo-text{font-size:15px;font-weight:800;background:linear-gradient(135deg,#6c8fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.2)}
.topbar-uname{font-size:13px;font-weight:600}
.logout-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;line-height:1}

/* ── DESKTOP SIDEBAR ── */
#sidebar{ display:none!important; }
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:6px 10px;margin-bottom:14px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;border:1px solid transparent}
.nav-item:hover{background:var(--glass);color:var(--text)}
.nav-item.on{background:linear-gradient(135deg,rgba(108,143,255,0.2),rgba(167,139,250,0.15));border-color:rgba(108,143,255,0.3);color:var(--accent)}
.sidebar-section{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;padding:10px 12px 4px}
.sidebar-bottom{margin-top:auto;padding:12px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}

/* ── MIDDLE AREA (sidebar + content) ── */
#middle{display:flex;flex:1;overflow:hidden}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(80px + var(--safe-bot))}
@media(min-width:768px){#content{padding:24px;padding-bottom:24px}}

/* ── BOTTOM NAV (mobile) ── */
#bottom-nav{ display:none!important; }
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;padding-top:6px;transition:all .15s;border:none;background:none;color:var(--text2)}
.bnav-item.on{color:var(--accent)}
.bnav-icon{font-size:20px;line-height:1;transition:transform .15s}
.bnav-item.on .bnav-icon{transform:scale(1.15)}
.bnav-label{font-size:9px;font-weight:600;letter-spacing:.3px}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-select{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none;max-width:140px}
.filter-select option{background:#1a1a2e}
.filter-pill{padding:7px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--glass);color:var(--text2);transition:all .2s;white-space:nowrap;-webkit-appearance:none}
.filter-pill.on{color:white}

/* ── CARDS ── */
.card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:16px}
.kpi-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);pointer-events:none}
.kpi-card:active{transform:scale(0.96);opacity:.85}
.kpi-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.kpi-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px;flex-shrink:0}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.3px;margin-bottom:4px;text-transform:uppercase}
.kpi-main{font-size:26px;font-weight:800;line-height:1;margin-bottom:6px;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;margin-top:2px}
.kpi-sub-val{font-weight:600;color:var(--text2)}
.kpi-sub-label{font-weight:400;font-size:10px;color:var(--text2);opacity:.7}
.kpi-arrow{font-size:9px;margin-left:auto;color:var(--text2);opacity:.5}
.kpi-yr-val{font-size:13px;font-weight:700;letter-spacing:-.3px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(auto-fit,minmax(155px,1fr))}}
.two-col{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.two-col{grid-template-columns:1fr 1fr}}
.col{display:flex;flex-direction:column;gap:14px}

/* ── TABLE ROWS ── */
.table-wrap{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.trow{display:flex;align-items:center;padding:11px 14px;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s}
.trow:last-child{border-bottom:none}
.trow:active{background:rgba(255,255,255,0.04)}
.chip{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}

/* ── INPUTS & BUTTONS ── */
.inp{background:rgba(255,255,255,0.07);border:1px solid var(--border2);border-radius:12px;padding:13px 14px;color:var(--text);font-size:16px;font-family:'Outfit',sans-serif;outline:none;width:100%;transition:all .2s;-webkit-appearance:none}
.inp:focus{border-color:rgba(108,143,255,0.6);background:rgba(108,143,255,0.08);box-shadow:0 0 0 3px rgba(108,143,255,0.14)}
select.inp option{background:#1a1a2e}
.btn{background:linear-gradient(135deg,#6c8fff,#a78bfa);border:none;color:white;padding:11px 16px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Outfit',sans-serif;-webkit-appearance:none;white-space:nowrap}
.btn:active{opacity:.85;transform:scale(0.97)}
.btng{background:var(--glass);border:1px solid var(--border2);color:var(--text2);padding:11px 16px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Outfit',sans-serif;-webkit-appearance:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fb{padding:10px 0;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;flex:1;text-align:center;background:var(--glass);color:var(--text2);transition:all .2s;font-family:'Outfit',sans-serif;-webkit-appearance:none}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;z-index:300;padding:0}
@media(min-width:600px){.mbg{align-items:center;padding:16px}}
.mbox{
  background:rgba(14,14,24,0.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid var(--border2);
  border-radius:24px 24px 0 0;
  padding:20px 20px calc(20px + var(--safe-bot));
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
@media(min-width:600px){.mbox{border-radius:20px;padding:26px;max-height:90vh}}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px;display:block}
.hidden{display:none!important}

/* ── MISC ── */
.infobox{border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6}
.infobox-blue{background:rgba(108,143,255,0.08);border:1px solid rgba(108,143,255,0.25);color:#8aa5ff}
.infobox-green{background:rgba(67,233,123,0.07);border:1px solid rgba(67,233,123,0.2);color:#43e97b}
.tip{font-size:11px;color:var(--text2);margin-top:3px}
.badge{font-size:10px;color:var(--text2);background:var(--glass);padding:2px 8px;border-radius:20px;border:1px solid var(--border);white-space:nowrap}
.chart-wrap{position:relative;height:180px}
.section-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.page-title{font-size:20px;font-weight:800;margin-bottom:16px}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0;position:relative}
.avatar::after{content:'';position:absolute;inset:-1px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15)}
.sep{height:1px;background:rgba(255,255,255,0.05);margin:4px 0}
.row-action{background:none;border:none;color:var(--text2);padding:6px;cursor:pointer;font-size:16px;flex-shrink:0;opacity:.55;line-height:1}
.row-action:active{opacity:1}
/* Section divider */
.mo-header{background:rgba(255,255,255,0.03);padding:8px 14px;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.04)}

/* ── HAMBURGER ── */
.ham-line{display:block;width:22px;height:2px;background:rgba(240,240,245,0.85);border-radius:2px;transition:all .25s}
#hamburger-btn.open #hl1{transform:translateY(7px) rotate(45deg)}
#hamburger-btn.open #hl2{opacity:0}
#hamburger-btn.open #hl3{transform:translateY(-7px) rotate(-45deg)}
/* ── DRAWER NAV ITEMS ── */
.dnav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:500;color:rgba(144,144,168,1);transition:all .18s;border:1px solid transparent}
.dnav-item:hover{background:rgba(255,255,255,0.05);color:#f0f0f5}
.dnav-item.on{background:linear-gradient(135deg,rgba(108,143,255,0.22),rgba(167,139,250,0.16));border-color:rgba(108,143,255,0.35);color:#6c8fff}
.dnav-icon{font-size:18px;width:24px;text-align:center}
/* ── VEHICLE LOGO IMG ── */
.veh-logo{height:18px;width:auto;object-fit:contain;filter:invert(1) brightness(2);opacity:0.9;max-width:60px}
.veh-logo-lg{height:24px;width:auto;object-fit:contain;filter:invert(1) brightness(2);opacity:0.9;max-width:80px}

/* Pass visibility toggle */
#l-pass{padding-right:44px}
/* Keep toggle ON state */
.keep-on{background:rgba(67,233,123,0.35)!important;border-color:rgba(67,233,123,0.5)!important}
.keep-on #keep-thumb{transform:translateX(18px);background:#43e97b!important}
/* Login btn loading */
.login-btn:disabled{opacity:.6;cursor:not-allowed}
/* Biometric btn hover */
#biometric-btn:hover{background:rgba(108,143,255,0.15)!important;border-color:rgba(108,143,255,0.5)!important}
</style>
</head>
<body>

<!-- ══ LOADING OVERLAY ══ -->
<div id="loading-overlay" style="position:fixed;inset:0;background:rgba(10,10,15,0.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(20px)">
  <span style="font-size:42px;filter:drop-shadow(0 0 20px rgba(108,143,255,0.7))">🏠</span>
  <div style="font-size:16px;font-weight:700;background:linear-gradient(135deg,#6c8fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">HomeFinance</div>
  <div style="display:flex;gap:6px;margin-top:4px">
    <span style="width:8px;height:8px;border-radius:50%;background:#6c8fff;animation:dot 1.2s ease-in-out infinite"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:#8b7ff8;animation:dot 1.2s ease-in-out infinite .2s"></span>
    <span style="width:8px;height:8px;border-radius:50%;background:#a78bfa;animation:dot 1.2s ease-in-out infinite .4s"></span>
  </div>
  <div id="loading-msg" style="font-size:12px;color:rgba(144,144,168,0.8)">Σύνδεση με βάση δεδομένων...</div>
</div>
<style>
@keyframes dot{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box glass2">
    <span class="login-logo">🏠</span>
    <div class="login-title">HomeFinance</div>
    <div class="login-sub">Οικονομική Διαχείριση</div>

    <!-- Biometric button (shown if available) -->
    <div id="biometric-wrap" style="display:none;margin-bottom:20px">
      <button id="biometric-btn" onclick="doBiometric()" style="width:100%;padding:16px;border-radius:16px;border:1px solid rgba(108,143,255,0.3);background:rgba(108,143,255,0.08);color:#6c8fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s">
        <span id="biometric-icon" style="font-size:24px">🔒</span>
        <span id="biometric-label">Είσοδος με Face ID / Touch ID</span>
      </button>
      <div style="display:flex;align-items:center;gap:10px;margin-top:20px;margin-bottom:4px">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.1)"></div>
        <span style="font-size:11px;color:rgba(144,144,168,0.7)">ή με email</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.1)"></div>
      </div>
    </div>

    <div class="lf">
      <label>Email</label>
      <input id="l-email" type="email" placeholder="email@example.com"
        autocomplete="email" autocapitalize="none" inputmode="email"
        onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()"/>
    </div>
    <div class="lf" style="position:relative">
      <label>Password</label>
      <input id="l-pass" type="password" placeholder="••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
      <button onclick="togglePassVis()" style="position:absolute;right:14px;bottom:13px;background:none;border:none;color:rgba(144,144,168,0.7);cursor:pointer;font-size:16px" id="pass-eye">👁</button>
    </div>

    <!-- Keep me signed in -->
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:18px;user-select:none">
      <div id="keep-toggle" onclick="toggleKeep()" style="width:44px;height:26px;border-radius:13px;background:rgba(108,143,255,0.3);border:1px solid rgba(108,143,255,0.4);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0">
        <div id="keep-thumb" style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#6c8fff;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>
      </div>
      <span style="font-size:13px;color:rgba(144,144,168,0.9)">Να με θυμάσαι</span>
    </label>

    <button class="login-btn" onclick="doLogin()">Είσοδος →</button>
    <div id="l-loading" style="display:none;text-align:center;margin-top:12px;font-size:13px;color:#6c8fff">⏳ Σύνδεση...</div>
    <div class="login-err" id="l-err"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-screen">

  <!-- DRAWER OVERLAY -->
  <div id="drawer-overlay" onclick="closeDrawer()" style="position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:none;transition:background .3s"></div>

  <!-- SIDE DRAWER -->
  <div id="drawer" style="position:fixed;top:0;left:-280px;width:260px;height:100%;z-index:201;background:rgba(10,10,18,0.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-right:1px solid rgba(255,255,255,0.12);padding-top:0;transition:left .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column">
    <!-- Drawer header -->
    <div style="display:flex;align-items:center;gap:10px;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)">

// ─── BIOMETRIC (Face ID / Touch ID via WebAuthn) ─────────────────────────────
const BIOMETRIC_KEY = 'hf_biometric_email';

async function checkBiometric(){
  if(!window.PublicKeyCredential){ return; } // not supported
  try {
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!available) return;
    const savedEmail = localStorage.getItem(BIOMETRIC_KEY);
    if(!savedEmail) return;
    // Show biometric button
    const wrap = document.getElementById('biometric-wrap');
    if(wrap) wrap.style.display='block';
    // Detect iOS Face ID vs fingerprint
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const icon  = document.getElementById('biometric-icon');
    const label = document.getElementById('biometric-label');
    if(icon)  icon.textContent  = isIOS ? '🔒' : '👆';
    if(label) label.textContent = isIOS ? 'Είσοδος με Face ID' : 'Είσοδος με Touch ID / Fingerprint';
  } catch(e){ console.log('Biometric check:',e); }
}

async function offerBiometric(email){
  if(!window.PublicKeyCredential) return;
  try {
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!available) return;
    const already = localStorage.getItem(BIOMETRIC_KEY);
    if(already === email) return; // already set up
    // Store email for biometric use
    localStorage.setItem(BIOMETRIC_KEY, email);
  } catch(e){ console.log('offerBiometric:',e); }
}

async function doBiometric(){
  const savedEmail = localStorage.getItem(BIOMETRIC_KEY);
  if(!savedEmail){ showLoginError('Δεν έχεις ρυθμίσει biometric login.'); return; }

  document.getElementById('l-loading').style.display='block';
  document.getElementById('l-err').style.display='none';

  try {
    // Use WebAuthn platform authenticator (Face ID / Touch ID)
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);

    const credOpts = {
      publicKey: {
        challenge,
        timeout: 60000,
        userVerification: 'required',
        rpId: window.location.hostname,
        allowCredentials: [],
      }
    };

    // This triggers Face ID / Touch ID on the device
    await navigator.credentials.get(credOpts);

    // If we get here, biometric passed — get stored password and login
    const storedPass = localStorage.getItem('hf_bp_' + btoa(savedEmail));
    if(!storedPass){
      document.getElementById('l-email').value = savedEmail;
      document.getElementById('l-loading').style.display='none';
      showLoginError('Πληκτρολόγησε το password μία φορά ακόμα για να ενεργοποιηθεί το biometric.');
      return;
    }
    const decoded = atob(storedPass);
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await auth.signInWithEmailAndPassword(savedEmail, decoded);
  } catch(e){
    document.getElementById('l-loading').style.display='none';
    if(e.name==='NotAllowedError'){
      showLoginError('Ακυρώθηκε η αναγνώριση.');
    } else {
      console.error('Biometric error:',e);
      showLoginError('Biometric αποτυχία. Χρησιμοποίησε email/password.');
    }
  }
}

// Store hashed pass for biometric after successful login
auth.onAuthStateChanged((u)=>{
  if(u){
    const pass = document.getElementById('l-pass')?.value;
    const email = u.email;
    if(pass && email){
      localStorage.setItem('hf_bp_' + btoa(email), btoa(pass));
    }
  }
});

const fExp=()=>state.expenses.filter(e=>e.year===state.filterYear&&(!state.filterMonth||e.month===state.filterMonth)&&(state.filterUser==="Όλοι"||e.user===state.filterUser)&&(state.filterExpCat==="Όλες"||e.category===state.filterExpCat));
const fShared=()=>state.sharedExp.filter(e=>e.year===state.filterYear&&(!state.filterMonth||e.month===state.filterMonth)&&(state.filterSharedUser==="Όλοι"||e.paidBy===state.filterSharedUser));
const fFuel=()=>state.fuel.filter(f=>f.year===state.filterYear&&(!state.filterMonth||f.month===state.filterMonth)&&(state.filterUser==="Όλοι"||VEH_OWNER[f.vehicle]===state.filterUser));
const fInc=()=>state.incomes.filter(i=>i.year===state.filterYear&&(!state.filterMonth||i.month===state.filterMonth)&&(state.filterUser==="Όλοι"||i.user===state.filterUser));
const mos=()=>state.filterMonth?1:(state.filterYear===CY?new Date().getMonth()+1:12);
const sumA=arr=>arr.reduce((s,e)=>s+(e.amount||0),0);
const sumI=arr=>arr.reduce((s,i)=>s+i.base+i.extra,0);

// ─── CHARTS ──────────────────────────────────────────────────────────────────
const CH={};
function dChart(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function mkBar(id,labels,datasets){
  dChart(id);const ctx=document.getElementById(id);if(!ctx)return;
  CH[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:datasets.map(d=>({...d,borderRadius:4,borderSkipped:false}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9090a8',font:{family:'Outfit',size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>`€${fmt(c.raw)}`}}},
      scales:{x:{ticks:{color:'#9090a8',font:{size:10}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#9090a8',font:{size:10},callback:v=>`€${v}`},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}}}}});
}
function mkDonut(id,labels,data,colors){
  dChart(id);const ctx=document.getElementById(id);if(!ctx)return;
  CH[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'rgba(10,10,15,0.9)'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: €${fmt(c.raw)}`}}}}});
}

function renderPage(){
  Object.keys(CH).forEach(k=>dChart(k));
  const p=document.getElementById('page');
  if(state.tab==='dashboard')p.innerHTML=pgDashboard();
  else if(state.tab==='expenses')p.innerHTML=pgExpenses();
  else if(state.tab==='shared')p.innerHTML=pgShared();
  else if(state.tab==='income')p.innerHTML=pgIncome();
  else if(state.tab==='fuel')p.innerHTML=pgFuel();
  setTimeout(renderCharts,60);
}

function renderCharts(){
  if(state.tab==='dashboard'){
    const md=MONTHS_S.map((_,i)=>{
      const mo=i+1;
      const exp=state.expenses.filter(e=>e.year===state.filterYear&&e.month===mo&&(state.filterUser==="Όλοι"||e.user===state.filterUser)).reduce((s,e)=>s+e.amount,0);
      const inc=state.incomes.filter(e=>e.year===state.filterYear&&e.month===mo&&(state.filterUser==="Όλοι"||e.user===state.filterUser)).reduce((s,e)=>s+e.base+e.extra,0);
      const sh=state.sharedExp.filter(e=>e.year===state.filterYear&&e.month===mo).reduce((s,e)=>s+e.amount,0);
      return{exp,inc,sh};
    });
    mkBar('ch-monthly',MONTHS_S,[
      {label:'Έξοδα',data:md.map(x=>Math.round(x.exp)),backgroundColor:'rgba(255,95,109,0.75)'},
      {label:'Κοινά',data:md.map(x=>Math.round(x.sh)),backgroundColor:'rgba(255,154,60,0.75)'},
      {label:'Έσοδα',data:md.map(x=>Math.round(x.inc)),backgroundColor:'rgba(67,233,123,0.75)'},
    ]);
    const fe=fExp(),fs=fShared(),map={};
    fe.forEach(e=>{map[e.category]=(map[e.category]||0)+e.amount;});
    fs.forEach(e=>{map[e.category]=(map[e.category]||0)+e.amount;});
    const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    mkDonut('ch-pie',sorted.map(x=>x[0]),sorted.map(x=>Math.round(x[1])),sorted.map(x=>CAT_COLORS[x[0]]||'#94a3b8'));
    const tc=document.getElementById('top-cats');
    if(tc)tc.innerHTML=sorted.slice(0,6).map(([n,v])=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer" onclick="goTab('${['Ενοίκιο','ΔΕΗ','Internet','Νερό','Supermarket','Κοινόχρηστα','Άλλο σπίτι'].includes(n)?'shared':'expenses'}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${CAT_COLORS[n]||'#94a3b8'};flex-shrink:0"></div>
        <div style="flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n}</div>
        <div style="font-weight:700;font-size:13px;color:var(--red)">€${fmt(v)}</div>
      </div>`).join('');
  }
  if(state.tab==='fuel'){
    const fd=MONTHS_S.map((_,i)=>{
      const mo=i+1;
      const fv=(v)=>state.fuel.filter(f=>f.year===state.filterYear&&f.month===mo&&f.vehicle===v).reduce((s,f)=>s+f.amount,0);
      return{fi:fv("Fiesta (Δημήτρης)"),pcx:fv("PCX (Δημήτρης)"),ka:fv("Ford Ka (Άννα)")};
    });
    mkBar('ch-fuel',MONTHS_S,[
      {label:'Fiesta',data:fd.map(x=>Math.round(x.fi*100)/100),backgroundColor:'rgba(192,132,252,0.8)'},
      {label:'PCX',data:fd.map(x=>Math.round(x.pcx*100)/100),backgroundColor:'rgba(251,146,60,0.8)'},
      {label:'Ka',data:fd.map(x=>Math.round(x.ka*100)/100),backgroundColor:'rgba(52,211,153,0.8)'},
    ]);
  }
}

// ─── PAGE: DASHBOARD ─────────────────────────────────────────────────────────
function pgDashboard(){
  const now = new Date();
  const curMo = now.getMonth()+1; // real current month

  // Helper: get data for a specific month (or all if mo=null)
  const expFor  = (yr,mo,u)=>state.expenses.filter(e=>e.year===yr&&(!mo||e.month===mo)&&(u==="Όλοι"||e.user===u)).reduce((s,e)=>s+e.amount,0);
  const shFor   = (yr,mo)=>state.sharedExp.filter(e=>e.year===yr&&(!mo||e.month===mo)).reduce((s,e)=>s+e.amount,0);
  const fuelFor = (yr,mo,u)=>state.fuel.filter(f=>f.year===yr&&(!mo||f.month===mo)&&(u==="Όλοι"||VEH_OWNER[f.vehicle]===u)).reduce((s,f)=>s+f.amount,0);
  const incFor  = (yr,mo,u)=>state.incomes.filter(i=>i.year===yr&&(!mo||i.month===mo)&&(u==="Όλοι"||i.user===u)).reduce((s,i)=>s+i.base+i.extra,0);

  const yr  = state.filterYear;
  const u   = state.filterUser;
  const fmo = state.filterMonth; // user-selected month filter

  // "Current" = if user picked a month use that, else use real current month
  const displayMo = fmo || (yr===CY ? curMo : null);

  // Main (big) numbers = selected/current month
  const moE = expFor(yr, displayMo, u);
  const moS = shFor(yr, displayMo);
  const moF = fuelFor(yr, displayMo, u);
  const moI = incFor(yr, displayMo, u);
  const moPool = displayMo ? 1200 : mos()*1200;

  // Sub (small) numbers = full year totals (hide if user already filtered a month)
  const showYr = !fmo; // only show yearly sub when no month filter
  const yrE = showYr ? expFor(yr, null, u) : null;
  const yrS = showYr ? shFor(yr, null) : null;
  const yrF = showYr ? fuelFor(yr, null, u) : null;
  const yrI = showYr ? incFor(yr, null, u) : null;
  const yrPool = showYr ? mos()*1200 : null;

  const moLabel = displayMo ? MONTHS[displayMo-1] : `${yr}`;
  const yrLabel = `Σύνολο ${yr}`;

  // Dot background colors (subtle)
  const dotBg = c => c.replace('var(--red)','rgba(255,95,109,0.18)').replace('var(--orange)','rgba(255,154,60,0.18)').replace('var(--yellow)','rgba(249,202,36,0.18)').replace('var(--green)','rgba(67,233,123,0.18)').replace('var(--cyan)','rgba(54,209,220,0.18)');

  const kpis=[
    {l:"Προσωπικά Έξοδα", mo:moE, yr:yrE, c:"var(--red)",    dc:"rgba(255,95,109,0.18)",   i:"📉", t:"expenses"},
    {l:"Κοινά Έξοδα",     mo:moS, yr:yrS, c:"var(--orange)", dc:"rgba(255,154,60,0.18)",   i:"🏠", t:"shared"},
    {l:"Καύσιμα",         mo:moF, yr:yrF, c:"var(--yellow)", dc:"rgba(249,202,36,0.18)",   i:"⛽", t:"fuel"},
    {l:"Έσοδα",           mo:moI, yr:yrI, c:"var(--green)",  dc:"rgba(67,233,123,0.18)",   i:"📈", t:"income"},
    {l:"Κοινό Ταμείο",   mo:moPool,yr:yrPool,c:"var(--cyan)",dc:"rgba(54,209,220,0.18)",   i:"🤝", t:"shared"},
  ];

  const m=mos();
  const uCards=["Δημήτρης","Άννα"].map(u=>{
    const uE=expFor(yr,fmo,u), uF=fuelFor(yr,fmo,u), uI=incFor(yr,fmo,u);
    const uP=(fmo?1:m)*(u==="Δημήτρης"?700:500), net=uI-uE-uF-uP;
    const yrUE=showYr?expFor(yr,null,u):null, yrUF=showYr?fuelFor(yr,null,u):null, yrUI=showYr?incFor(yr,null,u):null;
    return`<div class="card" style="border-color:${uColor(u)}33">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div class="avatar" style="background:${uGrad(u)}">${uInitials(u)}</div>
        <div>
          <div style="font-weight:700;font-size:14px;color:${uColor(u)}">${u}</div>
          <div style="font-size:10px;color:var(--text2)">${moLabel}</div>
        </div>
      </div>
      ${[
        {l:"Έσοδα",   mo:uI,  yr:yrUI, c:"var(--green)", t:"income"},
        {l:"Έξοδα",   mo:uE,  yr:yrUE, c:"var(--red)",   t:"expenses"},
        {l:"Καύσιμα", mo:uF,  yr:yrUF, c:"var(--yellow)",t:"fuel"},
        {l:"Εισφορά", mo:uP,  yr:null, c:"var(--cyan)",  t:"shared"},
        {l:"Υπόλοιπο",mo:net, yr:null, c:net>=0?"var(--green)":"var(--red)", t:null},
      ].map(r=>`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:${r.t?'pointer':'default'}" ${r.t?`onclick="goTab('${r.t}')"`:''}> 
          <span style="font-size:12px;color:var(--text2)">${r.l}${r.t?'<span style="font-size:9px;color:var(--accent);margin-left:3px">↗</span>':''}</span>
          <div style="text-align:right">
            <div style="font-weight:700;color:${r.c};font-size:14px">€${fmt(Math.abs(r.mo))}</div>
            ${r.yr!==null?`<div style="font-size:10px;color:var(--text2)">€${fmt(Math.abs(r.yr))} έτος</div>`:''}
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');

  return`<div class="col">
    <div class="infobox infobox-blue" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px">
        <div><span style="color:var(--text2)">DV: </span><span style="color:#6c8fff;font-weight:700">€${fmt(state.dimitrisSalary)}</span></div>

        <div><span style="color:var(--text2)">Ενοίκιο: </span><span style="color:var(--orange);font-weight:700">€400</span></div>
      </div>
      <button class="btn" style="font-size:11px;padding:7px 12px" onclick="openSalaryModal()">✏️ Μισθοί</button>
    </div>

    <div class="kpi-grid">${kpis.map(k=>`
      <div class="kpi-card" onclick="goTab('${k.t}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
          <div class="kpi-dot" style="background:${k.dc}">${k.i}</div>
          <span class="kpi-arrow">↗</span>
        </div>
        <div class="kpi-label">${k.l}</div>
        <div class="kpi-main" style="color:${k.c}">€${fmt(k.mo)}</div>
        <div class="kpi-sub">
          <span class="kpi-sub-label">${moLabel}</span>
          ${k.yr!==null?`<span style="margin-left:auto;display:flex;align-items:baseline;gap:3px"><span class="kpi-yr-val" style="color:${k.c};opacity:.55">€${fmt(k.yr)}</span><span style="font-size:9px;color:var(--text2);opacity:.5">${yr}</span></span>`:''}
        </div>
      </div>`).join('')}</div>

    <div class="card">
      <div class="section-label">Μηνιαία Εικόνα ${yr}</div>
      <div class="chart-wrap"><canvas id="ch-monthly"></canvas></div>
    </div>
    <div class="two-col">
      <div class="card" style="cursor:pointer" onclick="goTab('expenses')">
        <div class="section-label">Κατηγορίες <span style="color:var(--accent);font-size:9px">↗</span></div>
        <div style="height:160px;position:relative"><canvas id="ch-pie"></canvas></div>

      <div class="card"><div class="section-label">Top Κατηγορίες</div><div id="top-cats"></div></div>
    </div>
    <div class="two-col">${uCards}</div>
  </div>`;
}

    </div>
    <div style="font-size:13px;color:var(--text2)">${fe.length} εγγραφές · <span style="color:var(--red);font-weight:700">€${fmt(tot)}</span></div>

    ${byMo.map(x=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">

function openModal(type){
  const m=document.getElementById('modal'),mi=document.getElementById('modal-inner');
  m.classList.remove('hidden');
  let html='<span class="modal-handle"></span>';
  if(type==='expense')html+=mExpense();
  if(type==='income')html+=mIncome();
  if(type==='shared')html+=mShared();
  if(type==='fuel')html+=mFuel();
  mi.innerHTML=html;
}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

      </div>

}
async function saveSalary(){
  const nd=parseFloat(document.getElementById('sd').value)||state.dimitrisSalary;
  const na=parseFloat(document.getElementById('sa').value)||state.annaSalary;
  state.dimitrisSalary=nd;state.annaSalary=na;
  const now=new Date(),ny=now.getFullYear(),nm=now.getMonth()+1;
  state.incomes=state.incomes.map(i=>{
    if(!i.isBaseSalary)return i;
    if(i.year>ny||(i.year===ny&&i.month>=nm))return{...i,base:i.user==="Δημήτρης"?nd:na};
    return i;
  });
  closeModal();render();
}

// ─── BUTTON HELPERS ───────────────────────────────────────────────────────────
let _selVeh=0;
function sb(pfx,opts,val){
  opts.forEach(o=>{
    const el=document.getElementById(`${pfx}_${o}`);if(!el)return;
    if(o===val){el.style.background=uBg(val);el.style.borderColor=uColor(val);el.style.color=uColor(val);}
    else{el.style.background='var(--glass)';el.style.borderColor='var(--border)';el.style.color='var(--text2)';}
  });
}
function sveh(idx){
  _selVeh=idx;
  VEHICLES.forEach((v,i)=>{
    const el=document.getElementById(`fv_${i}`);if(!el)return;
    if(i===idx){el.style.background=VEH_COLOR[v]+'33';el.style.borderColor=VEH_COLOR[v];el.style.color=VEH_COLOR[v];}
    else{el.style.background='var(--glass)';el.style.borderColor='var(--border)';el.style.color='var(--text2)';}
  });
}
function getBtn(pfx,opts){
  for(const o of opts){
    const el=document.getElementById(`${pfx}_${o}`);
    if(el&&el.style.borderColor&&!el.style.borderColor.includes('0.10')&&!el.style.borderColor.includes('rgba(255,255,255,0.1'))return o;
  }
  return opts[0];
}
function g(id){return document.getElementById(id);}
async function saveExp(){
  const name=g('en').value.trim(),amount=parseFloat(g('ea').value);if(!name||!amount)return;
  const row={id:`e${Date.now()}`,name,amount,year:parseInt(g('ey').value),month:parseInt(g('em').value),category:g('ec').value,user:getBtn('eu',['Δημήτρης','Άννα'])};
  state.expenses.push(row);
  closeModal();render();
  await dbInsertExp(row);
}
async function saveInc(){
  const base=parseFloat(g('ib').value);if(!base)return;
  const row={id:`i${Date.now()}`,year:parseInt(g('iy').value),month:parseInt(g('im').value),user:getBtn('iu',['Δημήτρης','Άννα']),source:g('is').value||"Extra",base,extra:0,isBaseSalary:false};
  state.incomes.push(row);
  closeModal();render();
  await dbInsertInc(row);
}
async function saveSh(){
  const name=g('sn').value.trim(),amount=parseFloat(g('sa2').value);if(!name||!amount)return;
  const row={id:`s${Date.now()}`,name,amount,year:parseInt(g('sy').value),month:parseInt(g('sm').value),category:g('sc').value,paidBy:getBtn('su',['Κοινό','Δημήτρης','Άννα'])};
  state.sharedExp.push(row);
  closeModal();render();
  await dbInsertShared(row);
}
async function saveFuel(){
  const amount=parseFloat(g('fa').value);if(!amount)return;
  const date=g('fd').value,d=new Date(date),v=VEHICLES[_selVeh];
  const row={id:`f${Date.now()}`,date,amount,vehicle:v,year:d.getFullYear(),month:d.getMonth()+1};
  state.fuel.push(row);
  closeModal();render();
  await dbInsertFuel(row);
}
async function deleteItem(col,id){
  state[col]=state[col].filter(x=>x.id!==id);
  render();
  const tableMap={expenses:'expenses',sharedExp:'shared_expenses',fuel:'fuel',incomes:'incomes'};
  await dbDelete(tableMap[col],id);
}
function goTab(t){state.tab=t;render();document.getElementById('content').scrollTop=0;}

// PCX logo = black logo on dark bg → needs light container
// Ka logo = black logo on transparent → needs invert
// Fiesta = dark logo on white bg → needs invert
const VEH_FILTER = {
  "Fiesta (Δημήτρης)": "invert(1) brightness(1.8)",
  "PCX (Δημήτρης)":    "none",   // use white bg container instead
  "Ford Ka (Άννα)":    "brightness(0) invert(1)",
};
const VEH_NEEDS_BG = {
  "PCX (Δημήτρης)": true,
};
function vehImg(v, cls='veh-logo'){
  const filter = VEH_FILTER[v] || "invert(1)";
  const needsBg = VEH_NEEDS_BG[v];
  if(needsBg){
    // Wrap in white pill so black PCX logo is visible on dark bg
    const h = cls==='veh-logo-lg' ? '24px' : '18px';
    return `<span style="background:rgba(255,255,255,0.92);border-radius:6px;padding:2px 6px;display:inline-flex;align-items:center;justify-content:center;height:calc(${h} + 6px)"><img src="${VEH_LOGOS[v]}" style="height:${h};width:auto;max-width:70px;object-fit:contain;display:block" alt="${VEH_SHORT[v]}"/></span>`;
  }
  return `<img src="${VEH_LOGOS[v]}" class="${cls}" style="filter:${filter}" alt="${VEH_SHORT[v]}"/>`;
}

// Drawer functions
let drawerOpen = false;
function toggleDrawer(){
  drawerOpen ? closeDrawer() : openDrawer();
}
function openDrawer(){
  drawerOpen = true;
  const d = document.getElementById('drawer');
  const o = document.getElementById('drawer-overlay');
  const btn = document.getElementById('hamburger-btn');
  d.style.left = '0';
  o.style.display = 'block';
  setTimeout(()=>o.style.background='rgba(0,0,0,0.6)',10);
  if(btn) btn.classList.add('open');
  renderDrawerNav();
}
function closeDrawer(){
  drawerOpen = false;
  const d = document.getElementById('drawer');
  const o = document.getElementById('drawer-overlay');
  const btn = document.getElementById('hamburger-btn');
  d.style.left = '-280px';
  o.style.background = 'rgba(0,0,0,0)';
  if(btn) btn.classList.remove('open');
  setTimeout(()=>{ if(!drawerOpen) o.style.display='none'; }, 300);
}
function renderDrawerNav(){
  const dn = document.getElementById('drawer-nav');
  if(!dn) return;
  dn.innerHTML = TABS.map(t=>`
    <div class="dnav-item ${state.tab===t.id?'on':''}" onclick="goTab('${t.id}');closeDrawer()">
      <span class="dnav-icon">${t.icon}</span>
      <span>${t.label}</span>
    </div>`).join('');
}
function updateDrawerUser(){
  if(!currentUser) return;
  const da = document.getElementById('drawer-avatar');
  const dn = document.getElementById('drawer-uname');
  if(da){ da.textContent=currentUser.initials; da.style.background=currentUser.grad; }
  if(dn) dn.textContent=currentUser.name;
}

async function loadFromDB(){
  showLoading('Σύνδεση με Firebase...');
  try {
    const [eSnap,sSnap,fSnap,iSnap,stSnap] = await Promise.all([
      db.collection('expenses').get(),
      db.collection('shared_expenses').get(),
      db.collection('fuel').get(),
      db.collection('incomes').get(),
      db.collection('settings').doc('main').get(),
    ]);
    // First run: seed DB if empty
    if(eSnap.empty){
      showLoading('Πρώτη εκκίνηση — αποθήκευση ιστορικών δεδομένων...');
      await seedDatabase();
      await loadFromDB();
      return;
    }
    state.expenses  = eSnap.docs.map(d=>mapExp({id:d.id,...d.data()}));
    state.sharedExp = sSnap.docs.map(d=>mapShared({id:d.id,...d.data()}));
    state.fuel      = fSnap.docs.map(d=>mapFuel({id:d.id,...d.data()}));
    state.incomes   = iSnap.docs.map(d=>mapInc({id:d.id,...d.data()}));
    // Settings
    if(stSnap.exists){
      const st=stSnap.data();
      if(st.dimitris_salary) state.dimitrisSalary=parseFloat(st.dimitris_salary);
      if(st.anna_salary)     state.annaSalary=parseFloat(st.anna_salary);
    }
  } catch(e){
    console.error(e);
    showLoading('❌ Σφάλμα: '+e.message+' — Ελέγξε το Firebase config.');
    return;
  }
  hideLoading();
  render();
}

// ── SEED: insert all historical data on first run (Firebase batch writes) ──
async function seedDatabase(){
  const seedExp = [
    ...RAW26.map((e,i)=>({id:`e26_${i}`,name:e.n,amount:e.a,year:2026,month:e.mo,category:e.c,user_name:"Δημήτρης"})),
    ...RAW25.map((e,i)=>({id:`e25_${i}`,name:e.n,amount:e.a,year:2025,month:e.mo,category:e.c,user_name:"Δημήτρης"})),
    ...RAW24.map((e,i)=>({id:`e24_${i}`,name:e.n,amount:e.a,year:2024,month:e.mo,category:e.c,user_name:"Δημήτρης"})),
  ];
  const seedShared = [];
  [[2026,4],[2025,12],[2024,12]].forEach(([yr,mx])=>{
    for(let m=1;m<=mx;m++)
      seedShared.push({id:`rent_${yr}_${m}`,year:yr,month:m,name:`Ενοίκιο ${MONTHS[m-1]}`,amount:400,category:"Ενοίκιο",paid_by:"Κοινό"});
  });
  const seedFuel = [
    {id:"f1",date:"2026-01-05",amount:13.51,vehicle:"PCX (Δημήτρης)",year:2026,month:1},
    {id:"f2",date:"2026-01-17",amount:13.84,vehicle:"PCX (Δημήτρης)",year:2026,month:1},
    {id:"f3",date:"2026-01-24",amount:30.00,vehicle:"Fiesta (Δημήτρης)",year:2026,month:1},
    {id:"f4",date:"2026-02-02",amount:20.00,vehicle:"Fiesta (Δημήτρης)",year:2026,month:2},
    {id:"f5",date:"2026-02-10",amount:13.42,vehicle:"PCX (Δημήτρης)",year:2026,month:2},
    {id:"f6",date:"2026-02-17",amount:40.00,vehicle:"Fiesta (Δημήτρης)",year:2026,month:2},
    {id:"f7",date:"2026-02-26",amount:13.37,vehicle:"PCX (Δημήτρης)",year:2026,month:2},
    {id:"f8",date:"2026-03-12",amount:14.27,vehicle:"PCX (Δημήτρης)",year:2026,month:3},
    {id:"f9",date:"2026-03-18",amount:30.00,vehicle:"Fiesta (Δημήτρης)",year:2026,month:3},
    {id:"f10",date:"2026-03-30",amount:14.84,vehicle:"PCX (Δημήτρης)",year:2026,month:3},
    {id:"f11",date:"2026-04-17",amount:5.00,vehicle:"PCX (Δημήτρης)",year:2026,month:4},
    {id:"f12",date:"2026-04-21",amount:13.87,vehicle:"PCX (Δημήτρης)",year:2026,month:4},
  ];
  const seedInc = [];
  [[2026,4],[2025,12],[2024,12]].forEach(([yr,mx])=>{
    for(let m=1;m<=mx;m++){
      seedInc.push({id:`ds_${yr}_${m}`,year:yr,month:m,user_name:"Δημήτρης",source:"Εργασία 1 (Μισθός)",base:state.dimitrisSalary,extra:0,is_base_salary:true});
      seedInc.push({id:`as_${yr}_${m}`,year:yr,month:m,user_name:"Άννα",source:"Εργασία (Μισθός)",base:state.annaSalary,extra:0,is_base_salary:true});
    }
  });

  // Firebase batch write helper (max 500 ops per batch)
  const fbBatch = async (col, rows) => {
    let batch = db.batch();
    let count = 0;
    for(const row of rows){
      const {id, ...data} = row;
      batch.set(db.collection(col).doc(id), data);
      count++;
      if(count === 490){ await batch.commit(); batch=db.batch(); count=0; }
    }
    if(count>0) await batch.commit();
  };

  await fbBatch('expenses',       seedExp);
  await fbBatch('shared_expenses', seedShared);
  await fbBatch('fuel',            seedFuel);
  await fbBatch('incomes',         seedInc);
  await db.collection('settings').doc('main').set({
    dimitris_salary: state.dimitrisSalary,
    anna_salary:     state.annaSalary,
  });
}

// ── DB Write helpers (Firebase) ──
async function dbInsertExp(row){
  try{ await db.collection('expenses').doc(row.id).set({name:row.name,amount:row.amount,year:row.year,month:row.month,category:row.category,user_name:row.user,created_at:firebase.firestore.FieldValue.serverTimestamp()}); }
  catch(e){ console.error('insert expense:',e); }
}
async function dbInsertShared(row){
  try{ await db.collection('shared_expenses').doc(row.id).set({name:row.name,amount:row.amount,year:row.year,month:row.month,category:row.category,paid_by:row.paidBy,created_at:firebase.firestore.FieldValue.serverTimestamp()}); }
  catch(e){ console.error('insert shared:',e); }
}
async function dbInsertFuel(row){
  try{ await db.collection('fuel').doc(row.id).set({date:row.date,amount:row.amount,vehicle:row.vehicle,year:row.year,month:row.month,created_at:firebase.firestore.FieldValue.serverTimestamp()}); }
  catch(e){ console.error('insert fuel:',e); }
}
async function dbInsertInc(row){
  try{ await db.collection('incomes').doc(row.id).set({year:row.year,month:row.month,user_name:row.user,source:row.source,base:row.base,extra:row.extra||0,is_base_salary:row.isBaseSalary||false,created_at:firebase.firestore.FieldValue.serverTimestamp()}); }
  catch(e){ console.error('insert income:',e); }
}
async function dbDelete(col,id){
  try{ await db.collection(col).doc(id).delete(); }
  catch(e){ console.error('delete',col,':',e); }
}
async function dbUpdateSalaries(nd,na){
  const now=new Date(),ny=now.getFullYear(),nm=now.getMonth()+1;
  const toUpdate=state.incomes.filter(i=>i.isBaseSalary&&(i.year>ny||(i.year===ny&&i.month>=nm)));
  const batch=db.batch();
  toUpdate.forEach(i=>{
    const newBase=i.user==="Δημήτρης"?nd:na;
    batch.update(db.collection('incomes').doc(i.id),{base:newBase});
  });
  batch.update(db.collection('settings').doc('main'),{dimitris_salary:nd,anna_salary:na});
  await batch.commit();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyLayout();
loadFromDB();
</script>
